<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zynochat OTP</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body, html { height: 100%; width: 100%; overflow: hidden; }
        .app-container { display: flex; flex-direction: column; height: 100vh; }
        .header { background: #301934; color: white; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; }
        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; justify-content: space-around; }
        .logo-placeholder { width: 100px; height: 100px; border: 1px solid #301934; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        input { width: 100%; max-width: 400px; padding: 15px; border-radius: 30px; border: 1px solid #ccc; text-align: center; font-size: 18px; letter-spacing: 5px; }
        .timer-text { color: #555; font-size: 16px; margin-top: 10px; }
        #resendBtn {
            display: none; width: 100%; max-width: 400px; padding: 15px;
            border-radius: 30px; background: white; border: 2px solid #301934;
            color: #301934; font-weight: bold; font-size: 16px; cursor: pointer;
            margin-top: 12px;
        }
        #resendBtn:disabled { opacity: 0.6; cursor: not-allowed; }
        .encryption-tag { font-weight: bold; color: black; margin-bottom: 20px; }
        .bottom-bar { background: #301934; height: 50px; }
        #verifyBtn {
            display: block; width: 100%; max-width: 400px; padding: 15px;
            border-radius: 30px; background: white; border: 2px solid #301934;
            color: #301934; font-weight: bold; font-size: 16px; cursor: pointer;
            margin-top: 16px;
        }
        #verifyBtn:disabled { opacity: 0.6; cursor: not-allowed; }
        .error-msg { color: #c0392b; font-size: 13px; font-weight: 600; margin-top: 8px; display: none; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">ZYNOCHAT</div>
        <div class="main-content">
            <div class="logo-placeholder">LOGO</div>
            <div style="width: 100%; text-align: center;">
                <input type="text" id="otpInput" placeholder="XXXXXX" maxlength="6" inputmode="numeric">
                <p class="error-msg" id="errorMsg"></p>
                <p class="timer-text" id="timer">Resend OTP in 02:00</p>
                <button id="resendBtn" onclick="handleResend()">RESEND OTP</button>
                <button id="verifyBtn" onclick="handleVerify()">VERIFY OTP</button>
            </div>
            <div class="encryption-tag">End-to-End Encrypted</div>
        </div>
        <div class="bottom-bar"></div>
    </div>

    <script>
        // ✅ Koi bhi Supabase key nahi hai yahan!
        const API_BASE = ""; // same server pe hai, blank rakho // ← apna server URL daalo

        const email = localStorage.getItem('zyno_email');
        if (!email) window.location.href = '/login';

        const otpInput  = document.getElementById('otpInput');
        const timerEl   = document.getElementById('timer');
        const resendBtn = document.getElementById('resendBtn');
        const verifyBtn = document.getElementById('verifyBtn');
        const errorMsg  = document.getElementById('errorMsg');

        // ── Timer ──────────────────────────────────────
        let seconds = 120;
        let countdownInterval = startTimer();

        function startTimer() {
            timerEl.style.display = 'block';
            resendBtn.style.display = 'none';
            seconds = 120;
            return setInterval(() => {
                let m = Math.floor(seconds / 60);
                let s = seconds % 60;
                timerEl.innerText = `Resend OTP in ${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
                if (seconds <= 0) {
                    clearInterval(countdownInterval);
                    timerEl.style.display = 'none';
                    resendBtn.style.display = 'block';
                }
                seconds--;
            }, 1000);
        }

        // ── Helpers ────────────────────────────────────
        function showError(msg) { errorMsg.textContent = msg; errorMsg.style.display = 'block'; }
        function hideError()    { errorMsg.style.display = 'none'; }
        function setVerifyLoading(yes) {
            verifyBtn.disabled = yes;
            verifyBtn.textContent = yes ? 'Verify ho raha hai...' : 'VERIFY OTP';
        }
        function setResendLoading(yes) {
            resendBtn.disabled = yes;
            resendBtn.textContent = yes ? 'Bhej raha hoon...' : 'RESEND OTP';
        }

        otpInput.addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '').slice(0, 6);
            hideError();
        });

        // ── OTP Verify ─────────────────────────────────
        async function handleVerify() {
            const token = otpInput.value.trim();
            hideError();
            if (token.length !== 6) { showError('6 digit ka OTP daalo!'); return; }

            setVerifyLoading(true);
            try {
                const res = await fetch(`${API_BASE}/auth/verify-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, token })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'OTP galat hai ya expire ho gaya');

                // ✅ Sirf user info save karo — koi token nahi
                localStorage.setItem('zyno_user', JSON.stringify(data.user));
                localStorage.removeItem('zyno_email');

                alert('✅ Login ho gaya! Welcome to Zynochat!');
                window.location.href = '/dashboard'; // ← apna page daalo
            } catch (err) {
                showError('❌ ' + err.message);
                otpInput.value = '';
                setVerifyLoading(false);
            }
        }

        // ── OTP Resend ─────────────────────────────────
        async function handleResend() {
            hideError();
            setResendLoading(true);
            try {
                const res = await fetch(`${API_BASE}/auth/send-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Resend mein problem aayi');

                clearInterval(countdownInterval);
                otpInput.value = '';
                countdownInterval = startTimer();
            } catch (err) {
                showError('❌ ' + err.message);
            }
            setResendLoading(false);
        }

        otpInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleVerify(); });
    </script>
</body>
</html>
